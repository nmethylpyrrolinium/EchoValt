<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoVault — Profile</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<nav class="ev-nav fade-in">
    <div class="nav-logo">EchoVault</div>
    <ul class="nav-links">
        <li><a href="/" class="nav-link">Home</a></li>
        <li><a href="/pages/reflection.html" class="nav-link">Reflection</a></li>
        <li><a href="/pages/insights.html" class="nav-link">Insights</a></li>
        <li><a href="/pages/chat.html" class="nav-link">Chat</a></li>
        <li><a href="/pages/profile.html" class="nav-link active">Profile</a></li>
    </ul>
</nav>

<header class="ev-page-header fade-slide">
    <h1>Your Profile</h1>
    <p>Manage your account & sync your data.</p>
</header>

<main class="ev-container fade-up">

    <section class="ev-card">
        <h3>Account Status</h3>
        <p id="authStatus">Checking...</p>
        <button id="logoutBtn" class="ev-btn danger hidden">Logout</button>
    </section>

    <section class="ev-card">
        <h3>Log In</h3>
        <input type="email" id="loginEmail" class="ev-input" placeholder="Email">
        <input type="password" id="loginPassword" class="ev-input" placeholder="Password">
        <button class="ev-btn small" onclick="login()">Login</button>
    </section>

    <section class="ev-card">
        <h3>Sign Up</h3>
        <input type="email" id="signupEmail" class="ev-input" placeholder="Email">
        <input type="password" id="signupPassword" class="ev-input" placeholder="Password">
        <button class="ev-btn small" onclick="signup()">Sign Up</button>
    </section>

</main>

<footer class="ev-footer fade-up">
    <p>© EchoVault</p>
</footer>

<script src="/js/router.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/storage.js"></script>
<script src="/js/app.js"></script>

</body>
</html>
