<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoVault — Profile</title>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<nav class="ev-nav">
    <div class="nav-logo">EchoVault</div>
    <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/pages/reflection.html">Reflection</a></li>
        <li><a href="/pages/insights.html">Insights</a></li>
        <li><a href="/pages/chat.html">Chat</a></li>
        <li><a href="/pages/profile.html" class="active">Profile</a></li>
    </ul>
</nav>

<main class="ev-container">

    <h2>Profile</h2>

    <p id="authStatus">Checking...</p>
    <button id="logoutBtn" class="ev-btn hidden">Logout</button>

    <h3>Login</h3>
    <input id="loginEmail" placeholder="Email" class="ev-input">
    <input id="loginPassword" type="password" placeholder="Password" class="ev-input">
    <button onclick="login()" class="ev-btn">Login</button>

    <h3>Sign Up</h3>
    <input id="signupEmail" placeholder="Email" class="ev-input">
    <input id="signupPassword" type="password" placeholder="Password" class="ev-input">
    <button onclick="signup()" class="ev-btn">Sign Up</button>

</main>

<script src="/js/auth.js"></script>
<script src="/js/app.js"></script>

</body>
</html>
