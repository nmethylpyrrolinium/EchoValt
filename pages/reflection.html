<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reflection</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<nav class="ev-nav">
    <div class="nav-logo">EchoVault</div>
</nav>

<main class="ev-container">

    <h2>Daily Reflection</h2>

    <form id="reflectionForm">
        <textarea id="momentInput" placeholder="Your moment..." class="ev-textarea"></textarea>
        <textarea id="feelingInput" placeholder="Your feeling..." class="ev-textarea"></textarea>
        <button class="ev-btn">Save Reflection</button>
    </form>

    <div id="lastInsight" class="hidden">
        <h3>Insight</h3>
        <p id="lastInsightText"></p>
    </div>

</main>

<script src="/js/storage.js"></script>
<script src="/js/insight.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/app.js"></script>

</body>
</html>
