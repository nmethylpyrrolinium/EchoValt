<body>

<!-- Navigation -->

<header class="ev-page-header fade-slide">
    <h1>Daily Reflection</h1>
    <p>Capture your day. Understand your patterns.</p>
</header>

<main class="ev-container fade-up">

    <form id="reflectionForm" class="ev-form">
        <label>What was your most meaningful moment today?</label>
        <textarea id="momentInput" class="ev-textarea"></textarea>

        <label>What feeling dominated your day?</label>
        <textarea id="feelingInput" class="ev-textarea"></textarea>

        <button class="ev-btn large" id="generateBtn">Save Reflection</button>
    </form>

    <section id="lastInsight" class="ev-card hidden fade-up">
        <h3>Your Latest Insight</h3>
        <p id="lastInsightText"></p>
    </section>

</main>

<footer class="ev-footer fade-up">
    <p>© EchoVault</p>
</footer>

<script src="/js/router.js"></script>
<script src="/js/storage.js"></script>
